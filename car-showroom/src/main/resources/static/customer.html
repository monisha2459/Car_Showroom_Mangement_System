<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Car Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="brand">🚗 <span>Car</span>Showroom</a>
    <div class="nav-links">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="car.html">🚘 Cars</a>
      <a href="customer.html">👥 Customers</a>
      <a href="sales.html">💰 Sales</a>
    </div>
    <div class="nav-right">
      <span class="admin-name" id="admin-name"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrapper" style="margin-top:88px">
    <h1 class="page-title">👥 Customers</h1>

    <div class="card">
      <div class="toolbar">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Search by name..." oninput="handleSearch()">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">➕ Add Customer</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Actions</th></tr>
          </thead>
          <tbody id="customerTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="customerModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Customer</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <form id="customerForm">
        <div class="form-grid">
          <div class="form-group full">
            <label>Full Name *</label>
            <input type="text" id="name" placeholder="e.g. John Doe">
            <span class="error-msg" id="nameErr"></span>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="john@email.com">
            <span class="error-msg" id="emailErr"></span>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" placeholder="555-0100">
          </div>
          <div class="form-group full">
            <label>Address</label>
            <input type="text" id="address" placeholder="123 Main St">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Customer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
  <script>
    requireAuth();

    async function loadCustomers(search = '') {
      try {
        const url = search ? `/customers?search=${encodeURIComponent(search)}` : '/customers';
        const customers = await apiFetch(url);
        const tbody = document.getElementById('customerTableBody');
        if (customers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">👥</div><p>No customers found</p></div></td></tr>';
          return;
        }
        tbody.innerHTML = customers.map((c, i) => `
          <tr>
            <td>${i + 1}</td>
            <td><strong>${c.name}</strong></td>
            <td>${c.email || '-'}</td>
            <td>${c.phone || '-'}</td>
            <td>${c.address || '-'}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">🗑️ Delete</button></td>
          </tr>`).join('');
      } catch (e) {
        showToast('Failed to load customers', 'error');
      }
    }

    function handleSearch() {
      loadCustomers(document.getElementById('searchInput').value.trim());
    }

    function openAddModal() {
      document.getElementById('customerForm').reset();
      document.getElementById('nameErr').textContent = '';
      document.getElementById('emailErr').textContent = '';
      document.getElementById('customerModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('customerModal').classList.remove('active');
    }

    document.getElementById('customerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      document.getElementById('nameErr').textContent = '';
      document.getElementById('emailErr').textContent = '';

      if (!name) { document.getElementById('nameErr').textContent = 'Name is required'; return; }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').textContent = 'Invalid email'; return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Saving...';

      try {
        await apiFetch('/customers', {
          method: 'POST',
          body: JSON.stringify({
            name,
            email: email || null,
            phone: document.getElementById('phone').value.trim() || null,
            address: document.getElementById('address').value.trim() || null,
          })
        });
        showToast('Customer added successfully');
        closeModal();
        loadCustomers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Save Customer';
      }
    });

    async function deleteCustomer(id) {
      if (!confirm('Delete this customer?')) return;
      try {
        await apiFetch('/customers/' + id, { method: 'DELETE' });
        showToast('Customer deleted');
        loadCustomers();
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    loadCustomers();
  </script>
</body>
</html>
