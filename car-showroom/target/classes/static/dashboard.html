<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Car Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="brand">🚗 <span>Car</span>Showroom</a>
    <div class="nav-links">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="car.html">🚘 Cars</a>
      <a href="customer.html">👥 Customers</a>
      <a href="sales.html">💰 Sales</a>
    </div>
    <div class="nav-right">
      <span class="admin-name" id="admin-name"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrapper" style="margin-top:88px">
    <h1 class="page-title">📊 Dashboard</h1>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon blue">🚗</div><div class="stat-info"><div class="value" id="totalCars">-</div><div class="label">Total Cars</div></div></div>
      <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="value" id="availableCars">-</div><div class="label">Available</div></div></div>
      <div class="stat-card"><div class="stat-icon red">🔴</div><div class="stat-info"><div class="value" id="soldCars">-</div><div class="label">Sold</div></div></div>
      <div class="stat-card"><div class="stat-icon purple">👥</div><div class="stat-info"><div class="value" id="totalCustomers">-</div><div class="label">Customers</div></div></div>
      <div class="stat-card"><div class="stat-icon orange">📋</div><div class="stat-info"><div class="value" id="totalSales">-</div><div class="label">Total Sales</div></div></div>
      <div class="stat-card"><div class="stat-icon teal">💵</div><div class="stat-info"><div class="value" id="totalRevenue">-</div><div class="label">Revenue</div></div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px">
      <div class="card">
        <h3 style="margin-bottom:16px;font-size:1rem">Recent Sales</h3>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Car</th><th>Customer</th><th>Price</th><th>Date</th></tr></thead>
            <tbody id="recentSalesBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:16px;font-size:1rem">Quick Actions</h3>
        <div style="display:flex;flex-direction:column;gap:12px">
          <a href="car.html" class="btn btn-primary" style="text-decoration:none">➕ Add New Car</a>
          <a href="customer.html" class="btn btn-success" style="text-decoration:none">👤 Add Customer</a>
          <a href="sales.html" class="btn btn-warning" style="text-decoration:none">💰 Record Sale</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
  <script>
    requireAuth();

    async function loadDashboard() {
      try {
        const stats = await apiFetch('/dashboard/stats');
        document.getElementById('totalCars').textContent = stats.totalCars;
        document.getElementById('availableCars').textContent = stats.availableCars;
        document.getElementById('soldCars').textContent = stats.soldCars;
        document.getElementById('totalCustomers').textContent = stats.totalCustomers;
        document.getElementById('totalSales').textContent = stats.totalSales;
        document.getElementById('totalRevenue').textContent = formatINR(stats.totalRevenue);
      } catch (e) {
        showToast('Failed to load stats', 'error');
      }

      try {
        const sales = await apiFetch('/sales');
        const tbody = document.getElementById('recentSalesBody');
        const recent = sales.slice(-5).reverse();
        if (recent.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#64748b;padding:20px">No sales yet</td></tr>';
          return;
        }
        tbody.innerHTML = recent.map(s => `
          <tr>
            <td>${s.car.make} ${s.car.model}</td>
            <td>${s.customer.name}</td>
            <td>${formatINR(s.salePrice)}</td>
            <td>${s.saleDate}</td>
          </tr>`).join('');
      } catch (e) { /* ignore */ }
    }

    loadDashboard();
  </script>
</body>
</html>
